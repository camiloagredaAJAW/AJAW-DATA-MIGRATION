<!DOCTYPE html>
<html lang="en">
<head>
  <script>
    (function () {
      var stored = localStorage.getItem("theme");
      var theme = stored === "dark" || stored === "light" ? stored
        : (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
      document.documentElement.dataset.theme = theme;
    })();
  </script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Source Catalog — Ajaw Data Migration Admin</title>
  <link rel="stylesheet" href="/admin/style.css" />
</head>
<body data-page="catalog">
  <header class="app-header">
    <nav>
      <a href="/admin/dashboard.html">Dashboard</a>
      <a href="/admin/mappings.html">Field Mappings</a>
      <a href="/admin/catalog.html">Source Catalog</a>
      <a href="/admin/errors.html">Errors</a>
      <a href="/admin/analytics.html">Analytics</a>
    </nav>
    <div class="header-actions">
      <button id="theme-toggle-button" type="button">Dark mode</button>
      <button id="logout-button">Log out</button>
    </div>
  </header>

  <main>
    <h1>Source Catalog</h1>
    <p id="catalog-error" class="error-banner" hidden></p>

    <div class="controls-row">
      <button id="refresh-catalog-button">Refresh Catalog</button>
      <span id="refresh-catalog-result" class="muted"></span>
    </div>

    <table id="catalog-table">
      <thead>
        <tr>
          <th>Source DB</th>
          <th>Source Table</th>
          <th>Country Code</th>
          <th>Last Sampled At</th>
          <th>Sampled Row Count</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </main>

  <script src="/admin/app.js"></script>
</body>
</html>
