<!DOCTYPE html>
<html lang="en">
<head>
  <script>
    (function () {
      var stored = localStorage.getItem("theme");
      var theme = stored === "dark" || stored === "light" ? stored
        : (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
      document.documentElement.dataset.theme = theme;
    })();
  </script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Errors — Ajaw Data Migration Admin</title>
  <link rel="stylesheet" href="/admin/style.css" />
</head>
<body data-page="errors">
  <header class="app-header">
    <nav>
      <a href="/admin/dashboard.html">Dashboard</a>
      <a href="/admin/mappings.html">Field Mappings</a>
      <a href="/admin/catalog.html">Source Catalog</a>
      <a href="/admin/errors.html">Errors</a>
      <a href="/admin/analytics.html">Analytics</a>
    </nav>
    <div class="header-actions">
      <button id="theme-toggle-button" type="button"></button>
      <button id="logout-button">Log out</button>
    </div>
  </header>

  <main>
    <h1>Import Errors</h1>
    <p id="errors-error" class="error-banner" hidden></p>

    <div class="filters-row">
      <input type="number" id="filter-run-id" placeholder="run id" min="1" />
      <input type="text" id="filter-country-code" placeholder="country code" />
      <select id="filter-resolved">
        <option value="">All</option>
        <option value="false">Unresolved</option>
        <option value="true">Resolved</option>
      </select>
      <button id="filter-button">Filter</button>
      <button id="clear-filter-button">Clear</button>
    </div>

    <div class="controls-row">
      <button id="bulk-retry-button">Retry Failed (Bulk)</button>
      <span id="bulk-retry-result" class="muted"></span>
    </div>

    <table id="errors-table">
      <thead>
        <tr>
          <th>Id</th>
          <th>Timestamp</th>
          <th>Run</th>
          <th>Country</th>
          <th>Offset</th>
          <th>Identifier</th>
          <th>Reason</th>
          <th>Resolved</th>
          <th></th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

    <div class="controls-row">
      <button id="errors-first-button" disabled>First</button>
      <button id="errors-prev-button" disabled>Prev</button>
      <button id="errors-next-button" disabled>Next</button>
      <button id="errors-last-button" disabled>Last</button>
      <span id="errors-page-indicator" class="muted"></span>
    </div>
  </main>

  <script src="/admin/app.js"></script>
</body>
</html>
