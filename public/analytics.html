<!DOCTYPE html>
<html lang="en">
<head>
  <script>
    (function () {
      var stored = localStorage.getItem("theme");
      var theme = stored === "dark" || stored === "light" ? stored
        : (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
      document.documentElement.dataset.theme = theme;
    })();
  </script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Analytics — Ajaw Data Migration Admin</title>
  <link rel="stylesheet" href="/admin/style.css" />
</head>
<body data-page="analytics">
  <header class="app-header">
    <nav>
      <a href="/admin/dashboard.html">Dashboard</a>
      <a href="/admin/mappings.html">Field Mappings</a>
      <a href="/admin/catalog.html">Source Catalog</a>
      <a href="/admin/errors.html">Errors</a>
      <a href="/admin/analytics.html">Analytics</a>
    </nav>
    <div class="header-actions">
      <button id="theme-toggle-button" type="button">Dark mode</button>
      <button id="logout-button">Log out</button>
    </div>
  </header>

  <main>
    <h1>Analytics</h1>
    <!--
      `loadAnalytics()` in app.js hardcodes `document.getElementById("errors-error")`
      for its error banner (unchanged from when this section lived on
      errors.html — see the Task 2 brief: "no logic changes to them, just
      re-wire which page-init function calls them"). This element must keep
      that exact id so a failed analytics fetch still surfaces visibly here
      instead of being silently swallowed by showError/hideError's
      `element === null` no-op guard.
    -->
    <p id="errors-error" class="error-banner" hidden></p>

    <h2>Error Analytics</h2>
    <p class="muted">Error counts by hour for the selected day (UTC), and each hour's share of that day's total errors.</p>
    <div class="controls-row">
      <label for="analytics-day-filter">Day:</label>
      <input type="date" id="analytics-day-filter" />
    </div>
    <table id="analytics-table">
      <thead>
        <tr>
          <th>Hour</th>
          <th>Count</th>
          <th>% of Day Total</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </main>

  <script src="/admin/app.js"></script>
</body>
</html>
